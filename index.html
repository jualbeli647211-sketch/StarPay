<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TopUP e-Wallet & Pulsa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
        input, textarea, [contenteditable="true"] {
            user-select: text;
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
        }
        body {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 12px;
        }
        #app {
            max-width: 480px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px 32px 28px 28px;
            box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid #333333;
        }
        .app-header {
            background: #1e1e1e;
            padding: 18px 20px 14px 20px;
            color: #ffffff;
            border-bottom: 1px solid #333333;
        }
        .app-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
            line-height: 1.2;
        }
        .app-header h1 i {
            font-size: 1.8rem;
            color: #cccccc;
        }
        .app-header .sub {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-top: 6px;
            color: #b0b0b0;
            font-weight: 500;
        }
        .view {
            padding: 22px 18px 28px 18px;
            background: #ffffff;
            transition: 0.2s;
        }
        .section-label {
            color: #2c2c2c;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .section-label i {
            color: #4a4a4a;
        }
        .ewallet-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 5px;
        }
        .wallet-card {
            background: #f5f5f5;
            border: 1.5px solid #d4d4d4;
            border-radius: 22px;
            padding: 16px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: all 0.15s;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        .wallet-card:hover {
            border-color: #2c2c2c;
            background: #e6e6e6;
            transform: scale(0.98);
        }
        .wallet-logo {
            width: 64px;
            height: 64px;
            object-fit: contain;
            border-radius: 16px;
            pointer-events: none;
            -webkit-user-drag: none;
            user-drag: none;
        }
        .wallet-name {
            font-weight: 700;
            color: #1e1e1e;
            font-size: 1.1rem;
            text-align: center;
        }
        .back-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .back-btn {
            background: none;
            border: none;
            color: #2c2c2c;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 6px 10px 6px 0;
        }
        .selected-wallet-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f0f0f0;
            padding: 6px 18px 6px 12px;
            border-radius: 40px;
            border: 1px solid #b0b0b0;
        }
        .selected-wallet-badge img {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            pointer-events: none;
            -webkit-user-drag: none;
            user-drag: none;
        }
        .field-group {
            background: #f7f7f7;
            border-radius: 24px;
            padding: 16px;
            margin: 18px 0;
            border: 1px solid #d6d6d6;
        }
        .phone-field, .name-field {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #ffffff;
            border-radius: 60px;
            padding: 6px 6px 6px 18px;
            border: 1px solid #a0a0a0;
            width: 100%;
            margin-bottom: 10px;
        }
        .phone-field input, .name-field input {
            flex: 1;
            border: none;
            padding: 14px 0;
            font-size: 1rem;
            background: transparent;
            outline: none;
            min-width: 0;
            width: 100%;
            user-select: text;
            -webkit-user-select: text;
        }
        .contact-btn {
            background: #2c2c2c;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 10px 16px;
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .contact-btn i {
            color: #cccccc;
            font-size: 1rem;
        }
        .inline-controls {
            display: flex;
            gap: 12px;
            margin: 20px 0 12px;
            flex-wrap: wrap;
        }
        .ewallet-nav-btn {
            background: #e0e0e0;
            border: none;
            border-radius: 40px;
            padding: 10px 18px;
            font-weight: 600;
            color: #1e1e1e;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            flex: 1 1 auto;
            justify-content: center;
        }
        .ewallet-nav-btn i {
            color: #2c2c2c;
        }
        .kategori-dropdown {
            background: white;
            border: 2px solid #2c2c2c;
            border-radius: 40px;
            padding: 8px 18px;
            font-weight: 600;
            color: #2c2c2c;
            cursor: pointer;
            flex: 1 1 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .kategori-dropdown select {
            border: none;
            background: transparent;
            font-weight: 600;
            color: #2c2c2c;
            outline: none;
            width: 100%;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .product-list {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0 28px;
            max-height: 380px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .product-item {
            background: #f5f5f5;
            border-radius: 16px;
            padding: 12px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1.5px solid transparent;
            transition: 0.1s;
            cursor: pointer;
            text-align: center;
        }
        .product-item.selected {
            border-color: #2c2c2c;
            background: #e0e0e0;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.1);
        }
        .product-nominal {
            font-weight: 700;
            color: #1e1e1e;
            font-size: 0.85rem;
            margin-bottom: 6px;
            line-height: 1.2;
        }
        .product-price {
            color: #333333;
            font-weight: 700;
            background: #ffffff;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
            white-space: nowrap;
            border: 1px solid #cccccc;
            display: inline-block;
        }
        .next-btn, .buy-btn {
            background: #1e1e1e;
            border: none;
            border-radius: 60px;
            padding: 18px 24px;
            width: 100%;
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            margin-top: 8px;
            border: 1px solid #333333;
        }
        .next-btn:disabled, .buy-btn:disabled {
            background: #b0b0b0;
            cursor: not-allowed;
        }

            background: #f7f7f7;
            border-radius: 28px;
            padding: 22px;
            margin: 16px 0;
            border: 1px solid #d4d4d4;
        }

            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px dashed #bdbdbd;
        }
        .detail-row:last-child {
            border-bottom: none;
        }
        .detail-label {
            color: #2c2c2c;
            font-weight: 500;
        }
        .detail-value {
            font-weight: 700;
            color: #1e1e1e;
        }
        .qris-area {
            background: #fafafa;
            border-radius: 30px;
            padding: 20px 16px;
            text-align: center;
            border: 2px dashed #2c2c2c;
            margin: 20px 0;
        }
        .qris-area img {
            max-width: 200px;
            width: 100%;
            height: auto;
            margin: 0 auto 16px;
            display: block;
            border-radius: 20px;
            background: white;
            padding: 8px;
            border: 1px solid #cccccc;
            pointer-events: none;
            -webkit-user-drag: none;
            user-drag: none;
        }
        .qris-area p:last-child {
            display: none;
        }
        .whatsapp-notif {
            background: #25D366;
            color: #ffffff;
            padding: 12px;
            border-radius: 40px;
            font-size: 0.9rem;
            text-align: center;
            margin: 15px 0 0;
            border-left: 4px solid #075e54;
            font-weight: 600;
        }
        .hidden {
            display: none !important;
        }
        .error-msg {
            color: #b00020;
            font-size: 0.8rem;
            margin-top: 4px;
            padding-left: 12px;
        }
        .name-field {
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div id="app">
    <div class="app-header">
        <h1><i class="fas fa-wallet"></i> TOP-UP PULSA & E-WALLET</h1>
        <div class="sub">Belanja Aman, Cepat, Garansi Uang Kembali</div>
    </div>
    <div id="homeView" class="view">
        <div class="section-label"><i class="fas fa-hand-pointer"></i> PILIH PRODUK</div>
        <div class="ewallet-grid" id="ewalletGrid"></div>
    </div>
    <div id="nominalView" class="view hidden">
        <div class="back-row">
            <button class="back-btn" id="backToHomeBtn"><i class="fas fa-arrow-left"></i> kembali</button>
            <div id="selectedWalletBadge" class="selected-wallet-badge"></div>
        </div>
        <div class="field-group">
            <div class="section-label"><i class="fas fa-phone-alt"></i> NOMOR HANDPHONE</div>
            <div class="phone-field">
                <input type="tel" id="phoneInput" placeholder="08xxxxxxx" value="">
                <button class="contact-btn" id="contactPickerBtn"><i class="fas fa-address-book"></i> kontak</button>
            </div>
            <div id="phoneError" class="error-msg"></div>
        </div>
        <div class="inline-controls">
            <button class="ewallet-nav-btn" id="pilihEwalletBtn"><i class="fas fa-chevron-circle-left"></i> Ganti</button>
            <div class="kategori-dropdown">
                <select id="kategoriSelect"></select>
            </div>
        </div>
        <div class="section-label" style="margin-top: 4px;"><i class="fas fa-tag"></i> PILIH NOMINAL</div>
        <div id="productListContainer" class="product-list"></div>
        <button class="next-btn" id="goToDetailBtn" disabled><span>LANJUT</span> <i class="fas fa-arrow-right"></i></button>
    </div>
    <div id="detailView" class="view hidden">
        <div class="back-row">
            <button class="back-btn" id="backToNominalBtn"><i class="fas fa-arrow-left"></i> kembali</button>
            <span style="font-weight: 600; color:#2c2c2c;">Detail pesanan</span>
        </div>
        <div class="detail-card" id="detailCard"></div>
        <div class="name-field">
            <input type="text" id="customerNameInput" placeholder="Nama pelanggan (opsional)" value="">
        </div>
        <div class="section-label"><i class="fas fa-qrcode"></i> PEMBAYARAN QRIS</div>
        <div class="qris-area">
            <img src="https://i.postimg.cc/FKBx2LFj/quick-response-code-indonesia-standard-qris-logo-png-seeklogo-391791.png" alt="QRIS Standard" id="qrisImage">
            <p style="color: #1e1e1e; font-weight: 500;">Rp <span id="qrisAmount"></span></p>
        </div>
        <button class="buy-btn" id="beliSekarangBtn"><span>BELI SEKARANG</span> <i class="fab fa-whatsapp"></i></button>
        <div id="whatsappNotif" class="whatsapp-notif hidden"></div>
    </div>
</div>

        // Prevent copy & context menu
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => { if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'C')) e.preventDefault(); });
        document.addEventListener('copy', e => e.preventDefault());
        document.addEventListener('dragstart', e => { if (e.target.tagName === 'IMG') e.preventDefault(); });

        let currentView = 'home';
        let selectedEwallet = null;
        let selectedProduct = null;
        let phoneNumber = '';
        let customerName = '';

        // DOM elements
        const homeView = document.getElementById('homeView');
        const nominalView = document.getElementById('nominalView');
        const detailView = document.getElementById('detailView');
        const ewalletGrid = document.getElementById('ewalletGrid');
        const selectedWalletBadge = document.getElementById('selectedWalletBadge');
        const kategoriSelect = document.getElementById('kategoriSelect');
        const productListContainer = document.getElementById('productListContainer');
        const phoneInput = document.getElementById('phoneInput');
        const phoneError = document.getElementById('phoneError');
        const contactPickerBtn = document.getElementById('contactPickerBtn');
        const goToDetailBtn = document.getElementById('goToDetailBtn');
        const backToHomeBtn = document.getElementById('backToHomeBtn');
        const pilihEwalletBtn = document.getElementById('pilihEwalletBtn');
        const backToNominalBtn = document.getElementById('backToNominalBtn');
        const beliSekarangBtn = document.getElementById('beliSekarangBtn');
        const detailCard = document.getElementById('detailCard');
        const qrisAmount = document.getElementById('qrisAmount');
        const whatsappNotif = document.getElementById('whatsappNotif');
        const customerNameInput = document.getElementById('customerNameInput');

        // Helper functions
        function validatePhone(number) {
            const cleaned = number.replace(/\D/g, '');
            return (cleaned.length >= 10 && cleaned.length <= 13) && (cleaned.startsWith('08') || cleaned.startsWith('628'));
        }

        function updatePhoneValidation() {
            const num = phoneInput.value.trim();
            if (num && !validatePhone(num)) {
                phoneError.textContent = 'Nomor harus 08xx atau 628xx (10-13 digit)';
                return false;
            } else {
                phoneError.textContent = '';
                return true;
            }
        }

        phoneInput.addEventListener('input', updatePhoneValidation);

        // Contact picker (with fallback)
        async function pickContact() {
            if ('contacts' in navigator && 'select' in navigator.contacts) {
                try {
                    const contacts = await navigator.contacts.select(['tel'], { multiple: false });
                    if (contacts.length > 0 && contacts[0].tel && contacts[0].tel.length > 0) {
                        phoneInput.value = contacts[0].tel[0];
                        updatePhoneValidation();
                    } else {
                        fallbackContactPicker();
                    }
                } catch (err) {
                    fallbackContactPicker();
                }
            } else {
                fallbackContactPicker();
            }
        }

        function fallbackContactPicker() {
            const dummyContacts = ['087798661202', '081234567890', '085712345678', '089876543210'];
            let message = 'Pilih nomor kontak (simulasi):\n';
            dummyContacts.forEach((c, i) => { message += `${i+1}. ${c}\n`; });
            const input = prompt(message, dummyContacts[0]);
            if (input && input.trim()) {
                phoneInput.value = input.trim();
                updatePhoneValidation();
            }
        }

        contactPickerBtn.addEventListener('click', pickContact);

        // Render home screen
        function renderHome() {
            ewalletGrid.innerHTML = '';
            ewalletData.forEach(w => {
                const card = document.createElement('div');
                card.className = 'wallet-card';
                card.dataset.id = w.id;
                card.innerHTML = `<img class="wallet-logo" src="${w.logo}" alt="${w.name}" loading="lazy"><span class="wallet-name">${w.name}</span>`;
                card.addEventListener('click', () => {
                    selectedEwallet = w;
                    selectedProduct = null;
                    phoneNumber = phoneInput.value.trim();
                    renderNominalView();
                    switchView('nominal');
                });
                ewalletGrid.appendChild(card);
            });
        }

        // Render nominal selection screen
        function renderNominalView() {
            if (!selectedEwallet) return;

            // Update badge
            selectedWalletBadge.innerHTML = `<img src="${selectedEwallet.logo}" alt="${selectedEwallet.name}"><span style="font-weight:600;">${selectedEwallet.name}</span>`;

            // Populate dropdown
            kategoriSelect.innerHTML = '';
            ewalletData.forEach(w => {
                const option = document.createElement('option');
                option.value = w.id;
                option.textContent = w.name;
                if (selectedEwallet && w.id === selectedEwallet.id) option.selected = true;
                kategoriSelect.appendChild(option);
            });

            kategoriSelect.onchange = (e) => {
                const newWallet = ewalletData.find(w => w.id === e.target.value);
                if (newWallet) {
                    selectedEwallet = newWallet;
                    selectedProduct = null;
                    renderNominalView();
                }
            };

            // Render products
            productListContainer.innerHTML = '';
            selectedEwallet.products.forEach(p => {
                const prodDiv = document.createElement('div');
                prodDiv.className = `product-item ${selectedProduct && selectedProduct.nominal === p.nominal ? 'selected' : ''}`;
                prodDiv.innerHTML = `<span class="product-nominal">${p.nominal}</span><span class="product-price">Rp ${p.price.toLocaleString('id-ID')}</span>`;
                prodDiv.addEventListener('click', () => {
                    document.querySelectorAll('.product-item').forEach(el => el.classList.remove('selected'));
                    prodDiv.classList.add('selected');
                    selectedProduct = p;
                    goToDetailBtn.disabled = false;
                });
                productListContainer.appendChild(prodDiv);
            });

            phoneInput.value = phoneNumber;
            goToDetailBtn.disabled = !selectedProduct;
            updatePhoneValidation();
        }

        // Render detail screen
        function renderDetailView() {
            if (!selectedEwallet || !selectedProduct) return;
            const hp = phoneInput.value.trim();
            phoneNumber = hp;
            const name = customerNameInput.value.trim() || '-';
            detailCard.innerHTML = `
                <div class="detail-row"><span class="detail-label">Nomor Hp</span><span class="detail-value">${hp || '-'}</span></div>
                <div class="detail-row"><span class="detail-label">Nama</span><span class="detail-value">${name}</span></div>
                <div class="detail-row"><span class="detail-label">Provider</span><span class="detail-value">${selectedEwallet.name}</span></div>
                <div class="detail-row"><span class="detail-label">Nominal</span><span class="detail-value">${selectedProduct.nominal}</span></div>
                <div class="detail-row"><span class="detail-label">Harga</span><span class="detail-value">Rp ${selectedProduct.price.toLocaleString('id-ID')}</span></div>
                <div class="detail-row"><span class="detail-label">Deskripsi</span><span class="detail-value">Transfer pulsa/saldo</span></div>
            `;
            qrisAmount.textContent = selectedProduct.price.toLocaleString('id-ID');
            whatsappNotif.classList.add('hidden');
        }

        // Switch between views
        function switchView(view) {
            currentView = view;
            homeView.classList.add('hidden');
            nominalView.classList.add('hidden');
            detailView.classList.add('hidden');
            if (view === 'home') {
                homeView.classList.remove('hidden');
                selectedEwallet = null;
                selectedProduct = null;
                renderHome();
            } else if (view === 'nominal') {
                nominalView.classList.remove('hidden');
                renderNominalView();
            } else if (view === 'detail') {
                detailView.classList.remove('hidden');
                renderDetailView();
            }
        }

        // Open WhatsApp with order details
        function openWhatsApp() {
            if (!selectedProduct) return false;
            const hp = phoneInput.value.trim();
            const name = customerNameInput.value.trim() || '-';
            if (!hp) {
                alert('Nomor HP harus diisi!');
                return false;
            }
            if (!validatePhone(hp)) {
                alert('Nomor HP tidak valid! Format harus 08xx atau 628xx (10-13 digit)');
                return false;
            }
            const message = `🔹 *DETAIL TOPUP* 🔹\nProvider: ${selectedEwallet.name}\nProduk: ${selectedProduct.nominal}\nHarga: Rp ${selectedProduct.price.toLocaleString('id-ID')}\nDeskripsi: Transfer pulsa/saldo\n\nNomor HP: ${hp}\nNama: ${name}`;
            const encodedMessage = encodeURIComponent(message);
            const waNumber = CONFIG.WHATSAPP_NUMBER;
            window.open(`https://wa.me/${waNumber}?text=${encodedMessage}`, '_blank');
            whatsappNotif.classList.remove('hidden');
            whatsappNotif.innerHTML = `<i class="fab fa-whatsapp"></i> Pesanan dikirim via WhatsApp ke +${waNumber}<br><small>${selectedProduct.nominal}</small>`;
            return true;
        }

        // Event listeners
        backToHomeBtn.addEventListener('click', () => switchView('home'));
        pilihEwalletBtn.addEventListener('click', () => switchView('home'));
        backToNominalBtn.addEventListener('click', () => switchView('nominal'));

        goToDetailBtn.addEventListener('click', () => {
            if (!selectedProduct) return;
            const hp = phoneInput.value.trim();
            if (!hp) {
                alert('Nomor HP harus diisi!');
                return;
            }
            if (!validatePhone(hp)) {
                alert('Nomor HP tidak valid!');
                return;
            }
            phoneNumber = hp;
            switchView('detail');
        });

        beliSekarangBtn.addEventListener('click', () => {
            if (!selectedProduct) {
                alert('Pilih produk dulu');
                switchView('nominal');
                return;
            }
            const hp = phoneInput.value.trim();
            if (!hp) {
                alert('Nomor HP harus diisi!');
                switchView('nominal');
                return;
            }
            if (!validatePhone(hp)) {
                alert('Nomor HP tidak valid!');
                switchView('nominal');
                return;
            }
            openWhatsApp();
        });

        // Update name in detail view when typing
        customerNameInput.addEventListener('input', function() {
            if (currentView === 'detail') {
                const name = this.value.trim() || '-';
                const nameSpan = document.querySelector('.detail-row:nth-child(2) .detail-value');
                if (nameSpan) nameSpan.textContent = name;
            }
        });

        // Initial render
        renderHome();
    })();
</script>
